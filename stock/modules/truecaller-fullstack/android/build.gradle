plugins {
  id 'com.android.library'
  id 'expo-module-gradle-plugin'
}

group = 'expo.modules.truecallerfullstack'
version = '0.1.0'

android {
  namespace "expo.modules.truecallerfullstack"
  defaultConfig {
    versionCode 1
    versionName "0.1.0"
  }
  lintOptions {
    abortOnError false
  }
}

dependencies {
  implementation "com.truecaller.android.sdk:truecaller-sdk:3.2.1"
}
