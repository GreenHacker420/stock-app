name: Production Deploy

'on':
  push:
    branches:
      - master
    paths:
      - backend/**
      - .github/workflows/deploy.yml
      - docker-compose.yml
      - Caddyfile

concurrency:
  group: production
  cancel-in-progress: true

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: greenhacker420/shop-backend

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and Push Docker Image
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    needs: build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Copy Files to Server
        uses: appleboy/scp-action@v1.0.0
        with:
          host: ${{ secrets.LIGHTSAIL_HOST }}
          username: ${{ secrets.LIGHTSAIL_USER }}
          key: ${{ secrets.LIGHTSAIL_SSH_KEY }}
          source: docker-compose.yml
          target: /home/ubuntu/shop-app

      - name: SSH Deploy
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.LIGHTSAIL_HOST }}
          username: ${{ secrets.LIGHTSAIL_USER }}
          key: ${{ secrets.LIGHTSAIL_SSH_KEY }}
          script: |
            set -e
            cd /home/ubuntu/shop-app

            echo "🔑 Login to GHCR..."
            echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin

            IMAGE_NAME="${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}"
            IMAGE_TAG="${{ github.sha }}"
            export IMAGE_NAME IMAGE_TAG

            echo "📥 Pulling image version ${{ github.sha }}..."
            docker compose pull shop-backend

            echo "🧱 Running Prisma migrations..."
            docker compose run --rm shop-backend npx prisma migrate deploy

            echo "🚀 Updating services..."
            docker compose up -d --remove-orphans

            echo "⏳ Waiting for container to be healthy..."
            timeout 60 bash -c '
            until [ "$(docker inspect -f "{{.State.Health.Status}}" shop-backend)" = "healthy" ]
            do
              sleep 2
            done
            '

            echo "📜 Status Check:"
            cd /home/ubuntu/shop-app
            docker compose ps
            echo "✅ Deployed Image ID:"
            docker image inspect ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.sha }} --format '{{.Id}}'
            docker compose logs --tail 50 shop-backend || true

            EXPECTED_IMAGE="${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.sha }}"
            RUNNING_IMAGE="$(docker inspect shop-backend --format '{{.Config.Image}}')"
            test "$RUNNING_IMAGE" = "$EXPECTED_IMAGE"

            docker exec shop-backend node --input-type=module -e '
              import { appRoutes } from "./src/routes/index.js";
              const router = appRoutes.find(([prefix]) => prefix === "/whatsapp")?.[1];
              const paths = router?.stack.filter((layer) => layer.route).map((layer) => layer.route.path) ?? [];
              if (!paths.includes("/onboarding/sessions")) process.exit(1);
              process.exit(0);
            '

            if grep -q '^IMAGE_NAME=' .env; then
              sed -i "s|^IMAGE_NAME=.*|IMAGE_NAME=$IMAGE_NAME|" .env
            else
              printf '\nIMAGE_NAME=%s\n' "$IMAGE_NAME" >> .env
            fi
            if grep -q '^IMAGE_TAG=' .env; then
              sed -i "s|^IMAGE_TAG=.*|IMAGE_TAG=$IMAGE_TAG|" .env
            else
              printf 'IMAGE_TAG=%s\n' "$IMAGE_TAG" >> .env
            fi

            echo "🧹 Cleanup old images..."
            docker image prune -f

            echo "✅ Deployment complete"
