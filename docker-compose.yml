services:
  shop-backend:
    image: ${IMAGE_NAME}:${IMAGE_TAG:-latest}
    container_name: shop-backend
    restart: always
    read_only: true
    tmpfs:
      - /tmp
    security_opt:
      - no-new-privileges:true
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: '0.5'
    env_file:
      - .env
    environment:
      - NODE_ENV=production
      - PORT=6600
    networks:
      - backend_app

networks:
  backend_app:
    external: true
